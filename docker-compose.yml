version: '3.8'

services:

  backend:
    build: ./restapiinexpress-elainplva
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend2025-elainplva
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped